<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The attributes are a contract both sides write. The render module reads them to produce the widget output; the widget asks for changes through setAttributes, and the host edits them through a settings form built from the schema. Only the widget gives the values meaning.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="748" height="288" rx="12" fill="#ffffff"/>

  <!-- Caption -->
  <text x="380" y="38" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#334155">Both sides write the attributes; only the widget gives them meaning.</text>

  <!-- Host settings form (a write source) -->
  <rect x="44" y="112" width="156" height="76" rx="9" fill="#fafbfc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="122" y="130" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#64748b">host settings form</text>
  <rect x="60" y="140" width="124" height="14" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <rect x="60" y="162" width="124" height="14" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- Attributes: the contract -->
  <rect x="300" y="120" width="160" height="64" rx="9" fill="#fff3d0" stroke="#b07020" stroke-width="1.5"/>
  <text x="380" y="148" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13.5" font-weight="700" fill="#855317">attributes</text>
  <text x="380" y="166" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#855317" opacity="0.8">the contract</text>

  <!-- Widget output (read destination, and a write source via its control) -->
  <rect x="566" y="104" width="152" height="92" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="584" y="120" width="18" height="18" rx="4" fill="#2f54a5"/>
  <line x1="612" y1="125" x2="700" y2="125" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="612" y1="135" x2="678" y2="135" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="584" y="156" width="74" height="22" rx="5" fill="#eef2fb" stroke="#2f54a5" stroke-width="1.2"/>
  <text x="621" y="171" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#2f54a5">control</text>

  <!-- READ: render module reads attributes into the output -->
  <line x1="460" y1="140" x2="562" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="511" y="131" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">render module</text>

  <!-- WRITE (host): the settings form edits the values -->
  <line x1="200" y1="150" x2="296" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="248" y="141" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">host edits</text>

  <!-- WRITE (widget): the control calls setAttributes, looping back -->
  <path d="M 621 178 L 621 252 L 380 252 L 380 188" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="244" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">setAttributes · the widget asks</text>
</svg>
