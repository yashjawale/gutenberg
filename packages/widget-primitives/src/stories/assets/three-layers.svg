<svg viewBox="0 0 860 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The three layers a widget declares and how the host treats each: identity is copied and shown verbatim, framing is translated and materialized the host's own way, representation is rendered and mounted without interpretation.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="848" height="318" rx="12" fill="#ffffff"/>

  <!-- Column headers -->
  <text x="196" y="40" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#64748b">the widget declares</text>
  <text x="688" y="40" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#64748b">the host</text>

  <!-- Row 1: Identity -->
  <rect x="44" y="58" width="304" height="74" rx="9" fill="#e2ecfd" stroke="#2f54a5" stroke-width="1.5"/>
  <text x="64" y="88" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Identity</text>
  <text x="64" y="111" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10.5" fill="#2f54a5">name · title · icon · category</text>
  <line x1="352" y1="95" x2="556" y2="95" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="454" y="86" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" font-weight="700" fill="#1e3a8a">copied</text>
  <rect x="560" y="58" width="256" height="74" rx="9" fill="#fafbfc" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="578" y="90" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#475569">shows it verbatim</text>
  <text x="578" y="110" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#94a3b8">decides where, not what</text>

  <!-- Row 2: Framing -->
  <rect x="44" y="144" width="304" height="74" rx="9" fill="#d7f0ea" stroke="#1d6b5a" stroke-width="1.5"/>
  <text x="64" y="174" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1d6b5a">Framing</text>
  <text x="64" y="197" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10.5" fill="#1d6b5a">presentation</text>
  <line x1="352" y1="181" x2="556" y2="181" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="454" y="172" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" font-weight="700" fill="#1d6b5a">translated</text>
  <rect x="560" y="144" width="256" height="74" rx="9" fill="#fafbfc" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="578" y="176" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#475569">materializes it its own way</text>
  <text x="578" y="196" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#94a3b8">honor, map, or ignore</text>

  <!-- Row 3: Representation -->
  <rect x="44" y="230" width="304" height="74" rx="9" fill="#fff3d0" stroke="#b07020" stroke-width="1.5"/>
  <text x="64" y="260" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#855317">Representation</text>
  <text x="64" y="283" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10.5" fill="#855317">attributes · example · render</text>
  <line x1="352" y1="267" x2="556" y2="267" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="454" y="258" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" font-weight="700" fill="#855317">rendered</text>
  <rect x="560" y="230" width="256" height="74" rx="9" fill="#fafbfc" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="578" y="262" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#475569">mounts it, no interpretation</text>
  <text x="578" y="282" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#94a3b8">provides the container</text>
</svg>
